name: CI/CD Pipeline - Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/my-app

jobs:
  # ============================================================================
  # STAGE 1: BUILD & TEST
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run linting (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ============================================================================
  # STAGE 2: BUILD DOCKER IMAGE & PUSH TO DOCKER HUB
  # ============================================================================
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

  # ============================================================================
  # STAGE 3: DEPLOY TO PRODUCTION VM
  # ============================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          echo "Pulling fresh application image..."
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          
          echo "Cleaning up old container instances..."
          sudo docker stop webapp_v2 || true
          sudo docker rm webapp_v2 || true
          
          echo "Launching application container on port 5000..."
          sudo docker run -d --name webapp_v2 -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/my-app:latest
          
          echo "Waiting for app to initialize..."
          sleep 5
          
          echo "Verifying local application health..."
          curl -s http://localhost:5000/version